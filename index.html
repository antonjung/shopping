<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shopping">
  <title>Shopping</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="splash">
    <svg class="splash-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="15" y="36" width="70" height="54" rx="9" fill="rgba(255,255,255,0.18)" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
      <path d="M35 36 Q35 14 50 14 Q65 14 65 36" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="50" y1="54" x2="50" y2="70" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="42" y1="62" x2="58" y2="62" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    </svg>
    <div class="splash-title">Shopping</div>
  </div>
  <div id="app">
    <header class="header">
      <div class="header-left" id="header-left"></div>
      <h1 class="header-title" id="header-title">Items</h1>
      <div class="header-right" id="header-right">
        <button class="header-btn" id="header-action">+</button>
      </div>
    </header>
    <main class="main" id="main"></main>
    <nav class="nav">
      <button class="nav-tab active" data-tab="items">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Items
      </button>
      <button class="nav-tab" data-tab="menus">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        Menus
      </button>
      <button class="nav-tab" data-tab="lists">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        Lists
      </button>
      <button class="nav-tab" data-tab="shop">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.98-1.68l1.62-8.32H6"/></svg>
        Shop
      </button>
      <button class="nav-tab" data-tab="notes">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Notes
      </button>
    </nav>
  </div>

  <dialog id="modal">
    <div id="modal-content"></div>
  </dialog>

  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
